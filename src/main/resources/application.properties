spring.application.name=habit-tracker-api
server.port=8080

spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://root:rootpassword@localhost:27017/habitdb?authSource=admin}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/habit_tracker}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}

app.seed.enabled=${APP_SEED_ENABLED:true}

app.jwt.secret=${APP_JWT_SECRET:change-this-secret-key-change-this-secret-key}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}

app.semantic-compare.webhook-url=${APP_SEMANTIC_COMPARE_WEBHOOK_URL:http://localhost:5678/webhook/compare-texts}
app.semantic-compare.connect-timeout-ms=${APP_SEMANTIC_COMPARE_CONNECT_TIMEOUT_MS:2000}
app.semantic-compare.read-timeout-ms=${APP_SEMANTIC_COMPARE_READ_TIMEOUT_MS:5000}
